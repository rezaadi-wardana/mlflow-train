name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

env:
  CSV_URL: "MLproject/train_pca.csv"
  MLFLOW_TRACKING_URI: file://${{ github.workspace }}/mlruns

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"
      
      - name: Check Env
        run: echo $CSV_URL

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow scikit-learn pandas numpy

      - name: Clean previous mlruns
        run: rm -rf mlruns

      - name: Initialize MLflow default experiment
        run: |
          mkdir -p mlruns/0
          cat > mlruns/0/meta.yaml << EOF
          artifact_location: mlflow-artifacts:/0
          experiment_id: '0'
          lifecycle_stage: active
          name: Default
          EOF
          
      - name: Run mlflow project
        run: mlflow run MLproject --env-manager=local

      - name: Set up Git LFS
        run: |
          git config --global user.name ${{ secrets.username }}
          git config --global user.email ${{ secrets.email }}
          git lfs install
          git lfs track "mlruns/**"
          git add .gitattributes
          git commit -m "Track large files in mlruns with Git LFS" || true
          git push origin main
          
       # Save models to GitHub Repository
      - name: Save mlruns to repo
        run: |
          git config --global user.name ${{ secrets.username }}
          git config --global user.email ${{ secrets.email }}
          git add -f mlruns/
          git commit -m "Save mlruns from CI run" || true
          git push origin main